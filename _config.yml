  avatar: headshot.jpg
  bio: "Researcher and Technologist<br>California Digital Library | PhD Student in Mathematics and Higher Education"
  email: #emailaddress
  # Do not include the @ symbol in your Twitter username
  twitter: kristen_chua
  linkedin: kristen-chua
  github: kristen-chua
  orcid: # 0000-0002-9779-0437
  researchgate: #username
  mendeley: #username
  google:
    plus: #username
