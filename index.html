<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://kristen-chua.github.io/">
  <link rel="canonical" href="https://kristen-chua.github.io/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Kristen Chua’s Website</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: #f6f7f4;
      color: #263442;
      font: 18px/1.6 Georgia, serif;
    }
    main {
      width: min(100%, 38rem);
      padding: clamp(2rem, 6vw, 4rem);
      background: #fff;
      border: 1px solid #dde4df;
      border-radius: 1.25rem;
      box-shadow: 0 18px 45px rgba(22, 50, 79, .1);
      text-align: center;
    }
    .mark {
      display: inline-grid;
      place-items: center;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: #16324f;
      color: #fff;
      font: 700 14px/1 Arial, sans-serif;
      letter-spacing: .08em;
    }
    h1 { margin: 1.25rem 0 .5rem; color: #16324f; font-size: clamp(1.8rem, 5vw, 2.5rem); }
    p { margin: 0; }
    a { color: #0f766e; font-weight: 700; text-underline-offset: .2em; }
  </style>
</head>
<body>
  <main>
    <span class="mark" aria-hidden="true">KC</span>
    <h1>Kristen Chua’s website has moved</h1>
    <p>Taking you to the new site. If you are not redirected, <a href="https://kristen-chua.github.io/">continue to kristen-chua.github.io</a>.</p>
  </main>
</body>
</html>
